# QuantBot 配置文件

simulation:
  enabled: true
  price_change_range: 0.015

exchange:
  mexc:
    enabled: true
    api_key: "${MEXC_API_KEY}"
    api_secret: "${MEXC_API_SECRET}"
    testnet: false

trading:
  initial_capital: 100
  min_trade_amount: 10
  max_position_pct: 0.1
  max_positions: 5

# ===== 策略配置 =====
strategy:
  # 資金費套利
  funding_arbitrage:
    enabled: true
    min_funding_rate: 0.0001
    check_interval: 300
    exchange: "mexc"
    max_trade_amount: 10
    
  # 基差套利
  perpetual_arbitrage:
    enabled: true
    min_profit_ratio: 0.001
    check_interval: 60
    exchange: "mexc"
    max_trade_amount: 10
    
  # 趨勢突破
  trend_breakout:
    enabled: false  # 暫時關閉
    timeframes: ["1h", "4h"]
    rsi_period: 14
    rsi_oversold: 35
    rsi_overbought: 65
    volume_multiplier: 1.5
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"

risk:
  stop_loss: 0.015
  take_profit: 0.01
  max_daily_loss: 0.08
  max_consecutive_losses: 3
  pause_minutes: 30

notification:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

logging:
  level: "INFO"
  console: true

web:
  enabled: true
  port: 5000